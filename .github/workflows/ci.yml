name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-sidecar:
    name: Sidecar tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sidecar/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r sidecar/requirements-dev.txt

      - name: Run tests
        run: pytest
        working-directory: sidecar

  test-frontend:
    name: Frontend build + tests (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  check-tauri:
    name: Tauri type-check (Rust)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Create sidecar stub
        run: mkdir -p src-tauri/binaries && touch src-tauri/binaries/claude-lens-sidecar-aarch64-apple-darwin

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
